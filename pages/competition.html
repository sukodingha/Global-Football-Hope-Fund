<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competition</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <!-- Navigation Bar -->
        <nav>
            <a href="/index.html">Home</a>
            <a href="/pages/about.html">About</a>
            <a href="/pages/competition.html">Competition</a>
            <a href="/pages/donate.html">Donate</a>
            <a href="/pages/news.html">News</a>
            <a href="/pages/community.html">Community</a>
            <a href="/pages/dashboard.html">Dashboard</a>
            <a href="/pages/faq.html">FAQ</a>
            <a href="/pages/contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <h1>Competition</h1>

        <!-- Live Match Center Container -->
        <div class="competition-widget-container">
            <h2>Live Match Center</h2>
            
            <!-- This configures the API connection -->
            <api-sports-widget 
                 data-type="config" 
                 data-key="6e2987eec8066be0a986f648fe4a9cf7" <!-- Your API key -->
                 data-sport="football" 
                 data-theme="dark" 
                 data-show-logos="true"
                 data-timezone="Africa/Lagos">
            </api-sports-widget>

            <!-- This displays the live and scheduled games -->
            <api-sports-widget 
                 data-type="games" 
                 data-refresh="60">
            </api-sports-widget>
        </div>

        <!-- Custom Dashboard Live Score Mini-Feed -->
        <div class="custom-dashboard-scores">
            <h3>Today's Live Matches</h3>
            <div id="live-scores-feed" class="scores-grid">
                <p class="loading-text">Fetching live match updates...</p>
            </div>
        </div>

        <!-- Donation Form -->
        <div class="form-container" style="grid-template-columns: 1fr; max-width: 900px;">
            <h2>Donate to the Competition</h2>
            <form action="/pages/donation-confirmation.html" method="post">
                <label for="amount">Amount:</label>
                <input type="number" id="amount" name="amount" required>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <input type="submit" value="Donate">
            </form>
        </div>
    </main>

    <footer>
        <!-- Footer Content -->
    </footer>

    <!-- API-Sports Widget Loader Script -->
    <script type="module" src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>

    <!-- Custom Dashboard Live Score Mini-Feed JavaScript -->
    <script>
        // Add your custom JavaScript code here to fetch and display live match updates
    </script>
</body>
</html>
